server {
    listen 80;

    # Proxy all API routes to backend
    # BACKEND_HOST is injected via envsubst at container startup
    # In Kubernetes: set to the backend service name (e.g. aceest-backend-svc)
    # Port 80 is used as the K8s service exposes port 80 -> targetPort 5005
    location ~ ^/(auth|clients|programs|health|workouts|exercises|metrics|report) {
        proxy_pass http://${BACKEND_HOST};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Serve React app for everything else
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}