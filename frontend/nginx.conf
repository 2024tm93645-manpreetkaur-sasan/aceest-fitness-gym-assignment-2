server {
    listen 80;

    # Proxy all API routes to backend
    # BACKEND_HOST is set via environment variable:
    #   Docker Compose: backend (via --link)
    #   Kubernetes:     aceest-backend-svc
    location ~ ^/(auth|clients|programs|health) {
        proxy_pass http://${BACKEND_HOST}:5005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Serve React app for everything else
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}