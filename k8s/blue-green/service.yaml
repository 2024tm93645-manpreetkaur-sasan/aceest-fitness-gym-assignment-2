# Blue-Green Services
# aceest-backend-bg-svc routes to whichever slot is active (currently blue)
# Switch: kubectl patch svc aceest-backend-bg-svc -n blue-green -p '{"spec":{"selector":{"slot":"green"}}}'
# Rollback: kubectl patch svc aceest-backend-bg-svc -n blue-green -p '{"spec":{"selector":{"slot":"blue"}}}'
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-backend-bg-svc
  namespace: blue-green
spec:
  type: LoadBalancer
  selector:
    app: aceest
    tier: backend
    slot: blue
  ports:
  - port: 80
    targetPort: 5005
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-backend-blue-svc
  namespace: blue-green
spec:
  type: LoadBalancer
  selector:
    app: aceest
    tier: backend
    slot: blue
  ports:
  - port: 80
    targetPort: 5005
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-backend-green-svc
  namespace: blue-green
spec:
  type: LoadBalancer
  selector:
    app: aceest
    tier: backend
    slot: green
  ports:
  - port: 80
    targetPort: 5005
