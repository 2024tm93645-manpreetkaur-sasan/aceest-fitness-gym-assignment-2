apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-backend
  namespace: rolling
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
      tier: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: aceest
        tier: backend
    spec:
      imagePullSecrets:
      - name: dockerhub-secret
      containers:
      - name: aceest-backend
        image: sasanmanpreet91/aceest-fitness-gym-api:latest
        ports:
        - containerPort: 5005
        env:
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: aceest-secrets
              key: jwt-secret
        - name: DB_NAME
          value: "/data/aceest_fitness.db"
        readinessProbe:
          httpGet:
            path: /health
            port: 5005
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-frontend
  namespace: rolling
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
      tier: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: aceest
        tier: frontend
    spec:
      imagePullSecrets:
      - name: dockerhub-secret
      containers:
      - name: aceest-frontend
        image: sasanmanpreet91/aceest-fitness-gym-ui:latest
        ports:
        - containerPort: 80
        env:
        - name: BACKEND_HOST
          value: "aceest-backend-svc"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
