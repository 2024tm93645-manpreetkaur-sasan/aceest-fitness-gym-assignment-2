# Secret for JWT key — apply once per cluster
#
# NOTE: In production, secrets should never be stored in plain text in Git.
# The recommended approach is to fetch secrets from a secrets manager
# such as HashiCorp Vault, AWS Secrets Manager, or Kubernetes Sealed Secrets.
# Integration with a secrets manager was out of scope for this assignment.
apiVersion: v1
kind: Secret
metadata:
  name: aceest-secrets
type: Opaque
stringData:
  jwt-secret: "aceest-super-secret-change-me"
