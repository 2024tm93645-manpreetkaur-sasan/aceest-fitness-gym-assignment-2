apiVersion: v1
kind: Service
metadata:
  name: aceest-backend-svc
  namespace: rolling
spec:
  type: LoadBalancer
  selector:
    app: aceest
    tier: backend
  ports:
  - port: 80
    targetPort: 5005
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-frontend-svc
  namespace: rolling
spec:
  type: LoadBalancer
  selector:
    app: aceest
    tier: frontend
  ports:
  - port: 80
    targetPort: 80
