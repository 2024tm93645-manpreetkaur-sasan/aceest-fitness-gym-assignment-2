---
apiVersion: v1
kind: Service
metadata:
  name: aceest-backend-svc
spec:
  selector:
    app: aceest
    tier: backend
  ports:
  - protocol: TCP
    port: 5005
    targetPort: 5005
    nodePort: 30005
  type: NodePort

---
apiVersion: v1
kind: Service
metadata:
  name: aceest-frontend-svc
spec:
  selector:
    app: aceest
    tier: frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30080
  type: NodePort
