# Routes to BOTH stable and canary pods via shared app+tier label
# Promote: kubectl scale deployment aceest-backend-canary --replicas=10
#          kubectl scale deployment aceest-backend-stable --replicas=0
# Rollback: kubectl delete deployment aceest-backend-canary
apiVersion: v1
kind: Service
metadata:
  name: aceest-backend-canary-svc
spec:
  selector:
    app: aceest
    tier: backend
  ports:
  - port: 5005
    targetPort: 5005
    nodePort: 30007
  type: NodePort
