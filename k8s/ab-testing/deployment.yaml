# A/B Testing — two versions serve distinct user segments
# Group A (control) = :42 Ocean Blue | Group B (variant) = :43 Forest Green
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-backend-version-a
  namespace: ab-testing
  annotations:
    user-segment: control
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
      tier: backend
      variant: version-a
  template:
    metadata:
      labels:
        app: aceest
        tier: backend
        variant: version-a
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: aceest-backend
          image: sasanmanpreet91/aceest-fitness-gym-api:42
          ports:
            - containerPort: 5005
          env:
            - name: AB_VARIANT
              value: "A"
          readinessProbe:
            httpGet:
              path: /health
              port: 5005
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-backend-version-b
  namespace: ab-testing
  annotations:
    user-segment: variant
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
      tier: backend
      variant: version-b
  template:
    metadata:
      labels:
        app: aceest
        tier: backend
        variant: version-b
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: aceest-backend
          image: sasanmanpreet91/aceest-fitness-gym-api:43
          ports:
            - containerPort: 5005
          env:
            - name: AB_VARIANT
              value: "B"
          readinessProbe:
            httpGet:
              path: /health
              port: 5005
            initialDelaySeconds: 10
            periodSeconds: 5