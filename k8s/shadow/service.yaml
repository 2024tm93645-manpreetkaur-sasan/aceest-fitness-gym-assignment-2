apiVersion: v1
kind: Service
metadata:
  name: aceest-backend-stable-svc
  namespace: shadow
  annotations:
    note: "Live production traffic - users see this"
spec:
  type: LoadBalancer
  selector:
    app: aceest
    tier: backend
    track: stable-shadow
  ports:
  - port: 80
    targetPort: 5005
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-backend-shadow-svc
  namespace: shadow
  annotations:
    note: "Mirrored traffic - responses discarded"
spec:
  type: LoadBalancer
  selector:
    app: aceest
    tier: backend
    track: shadow
  ports:
  - port: 80
    targetPort: 5005
