---
apiVersion: v1
kind: Service
metadata:
  name: aceest-backend-stable-svc
  annotations:
    note: "Live production traffic — users see this"
spec:
  selector:
    app: aceest
    tier: backend
    track: stable-shadow
  ports:
  - port: 5005
    targetPort: 5005
    nodePort: 30008
  type: NodePort

---
apiVersion: v1
kind: Service
metadata:
  name: aceest-backend-shadow-svc
  annotations:
    note: "Mirrored traffic — responses discarded"
spec:
  selector:
    app: aceest
    tier: backend
    track: shadow
  ports:
  - port: 5005
    targetPort: 5005
    nodePort: 30009
  type: NodePort
