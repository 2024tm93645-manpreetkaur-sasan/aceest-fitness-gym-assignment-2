# Shadow — production traffic goes to stable (Blue)
# Identical traffic mirrored to shadow (Green) — responses discarded
# Stable = :42 Ocean Blue theme | Shadow = :43 Forest Green theme
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-backend-stable-shadow
  namespace: shadow
  annotations:
    role: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
      tier: backend
      track: stable-shadow
  template:
    metadata:
      labels:
        app: aceest
        tier: backend
        track: stable-shadow
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: aceest-backend
          image: sasanmanpreet91/aceest-fitness-gym-api:42
          ports:
            - containerPort: 5005
          readinessProbe:
            httpGet:
              path: /health
              port: 5005
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-backend-shadow
  namespace: shadow
  annotations:
    role: shadow-testing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
      tier: backend
      track: shadow
  template:
    metadata:
      labels:
        app: aceest
        tier: backend
        track: shadow
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: aceest-backend
          image: sasanmanpreet91/aceest-fitness-gym-api:43
          ports:
            - containerPort: 5005
          readinessProbe:
            httpGet:
              path: /health
              port: 5005
            initialDelaySeconds: 10
            periodSeconds: 5