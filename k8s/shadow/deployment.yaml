# Production traffic goes to stable (v1)
# Identical traffic mirrored to shadow (v2) - responses discarded
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-backend-stable-shadow
  namespace: shadow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
      tier: backend
      track: stable-shadow
  template:
    metadata:
      labels:
        app: aceest
        tier: backend
        track: stable-shadow
    spec:
      imagePullSecrets:
      - name: dockerhub-secret
      containers:
      - name: aceest-backend
        image: sasanmanpreet91/aceest-fitness-gym-api:18
        ports:
        - containerPort: 5005
        readinessProbe:
          httpGet:
            path: /health
            port: 5005
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-backend-shadow
  namespace: shadow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
      tier: backend
      track: shadow
  template:
    metadata:
      labels:
        app: aceest
        tier: backend
        track: shadow
    spec:
      imagePullSecrets:
      - name: dockerhub-secret
      containers:
      - name: aceest-backend
        image: sasanmanpreet91/aceest-fitness-gym-api:21
        ports:
        - containerPort: 5005
        readinessProbe:
          httpGet:
            path: /health
            port: 5005
          initialDelaySeconds: 10
          periodSeconds: 5
